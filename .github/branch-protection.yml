# Branch Protection Rules for Documentation Deployment
# This file defines the rules for the testing branch to ensure
# only documentation changes are allowed for GitHub Pages deployment

branches:
  - name: testing
    protection:
      # Require pull request reviews before merging
      required_pull_request_reviews:
        required_approving_review_count: 1
        dismiss_stale_reviews: true
        require_code_owner_reviews: false
      
      # Require status checks to pass before merging
      required_status_checks:
        strict: true
        contexts:
          - "validate-docs"
          - "deploy-docs"
      
      # Restrict pushes that create files that use the git-lfs (Large File Storage) specification
      enforce_admins: false
      
      # Restrict pushes to matching branches
      restrictions:
        users: []
        teams: []
      
      # Allow force pushes
      allow_force_pushes: false
      
      # Allow deletions
      allow_deletions: false
      
      # Block creation of branches that match this rule
      block_creations: false
      
      # Require a pull request before merging
      required_pull_request_reviews:
        required_approving_review_count: 1
        dismiss_stale_reviews: true
        require_code_owner_reviews: false
        require_last_push_approval: false
      
      # Require conversation resolution before merging
      required_conversation_resolution: true
      
      # Require signed commits
      required_signatures: false
      
      # Require linear history
      required_linear_history: false
      
      # Require deployments to succeed before merging
      required_deployment_environments: []
      
      # Lock branch
      lock_branch: false
      
      # Allow fork syncing
      allow_fork_syncing: true

# Documentation-specific rules
documentation_rules:
  allowed_paths:
    - "docs/**"
    - ".github/workflows/docs-deploy.yml"
    - ".github/branch-protection.yml"
    - "README.md"
  
  required_files:
    - "docs/index.html"
    - "docs/installation.html"
    - "docs/styles.css"
    - "docs/.nojekyll"
  
  validation_checks:
    - "HTML syntax validation"
    - "CSS file presence"
    - "Required files check"
    - "Navigation consistency"
    - "Link validation" 