name: Promote Testing to Main

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.2.0)'
        required: true
        default: 'v1.2.0'
      force_promote:
        description: 'Force promotion even if tests fail'
        required: false
        default: 'false'
      cleanup_files:
        description: 'Remove development files before promotion'
        required: false
        default: 'true'

permissions:
  contents: write
  pull-requests: write
  actions: read

concurrency:
  group: "promote-to-main"
  cancel-in-progress: false

jobs:
  validate-testing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout testing branch
        uses: actions/checkout@v4
        with:
          ref: testing
      
      - name: Validate testing branch
        run: |
          echo "=== Testing Branch Validation ==="
          echo "Checking for required files..."
          
          # Check for required files
          required_files=("README.md" "LICENSE" "CHANGELOG.md" "requirements.txt" "setup.py" "VERSION")
          missing_files=()
          
          for file in "${required_files[@]}"; do
            if [ -f "$file" ]; then
              echo "✅ $file - Found"
            else
              echo "❌ $file - Missing"
              missing_files+=("$file")
            fi
          done
          
          if [ ${#missing_files[@]} -gt 0 ]; then
            echo "Error: Missing required files: ${missing_files[*]}"
            exit 1
          fi
          
          echo ""
          echo "Checking for unwanted development files..."
          
          # Check for files that should be removed
          unwanted_files=("warp-nextdns-manager.spec" "MODERN_UI_IMPLEMENTATION_SUMMARY.md")
          found_unwanted=()
          
          for file in "${unwanted_files[@]}"; do
            if [ -f "$file" ]; then
              echo "⚠️  $file - Found (will be removed)"
              found_unwanted+=("$file")
            fi
          done
          
          echo ""
          echo "Validation completed successfully!"

  run-tests:
    runs-on: ubuntu-latest
    needs: validate-testing
    steps:
      - name: Checkout testing branch
        uses: actions/checkout@v4
        with:
          ref: testing
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run tests
        run: |
          echo "=== Running Tests ==="
          python -m pytest tests/ -v
      
      - name: Run linting
        run: |
          echo "=== Running Linting ==="
          pip install flake8 black
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          black --check .

  cleanup-files:
    runs-on: ubuntu-latest
    needs: [validate-testing, run-tests]
    if: needs.run-tests.result == 'success' || github.event.inputs.force_promote == 'true'
    steps:
      - name: Checkout testing branch
        uses: actions/checkout@v4
        with:
          ref: testing
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Remove development files
        if: github.event.inputs.cleanup_files == 'true'
        run: |
          echo "=== Cleaning Up Development Files ==="
          
          # Remove unwanted files
          files_to_remove=(
            "warp-nextdns-manager.spec"
            "MODERN_UI_IMPLEMENTATION_SUMMARY.md"
            ".github/workflows/pages-debug.yml"
            ".github/workflows/test-trigger.yml"
          )
          
          for file in "${files_to_remove[@]}"; do
            if [ -f "$file" ]; then
              echo "Removing $file..."
              git rm "$file"
            fi
          done
          
          # Commit cleanup if any files were removed
          if ! git diff --cached --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "cleanup: remove development files before promotion to main"
            git push origin testing
          else
            echo "No files to remove"
          fi
      
      - name: Update version
        run: |
          echo "=== Updating Version ==="
          version="${{ github.event.inputs.version }}"
          echo "$version" > VERSION
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "chore: update version to $version"
          git push origin testing

  create-release-branch:
    runs-on: ubuntu-latest
    needs: cleanup-files
    steps:
      - name: Checkout testing branch
        uses: actions/checkout@v4
        with:
          ref: testing
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Create release branch
        run: |
          echo "=== Creating Release Branch ==="
          version="${{ github.event.inputs.version }}"
          release_branch="release/${version#v}"
          
          git checkout -b "$release_branch"
          git push origin "$release_branch"
          
          echo "Release branch created: $release_branch"
          echo "RELEASE_BRANCH=$release_branch" >> $GITHUB_ENV

  create-pull-request:
    runs-on: ubuntu-latest
    needs: create-release-branch
    steps:
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: main
          branch: ${{ needs.create-release-branch.outputs.RELEASE_BRANCH }}
          title: "Release ${{ github.event.inputs.version }} - Promote from testing to main"
          body: |
            ## 🚀 Release ${{ github.event.inputs.version }}
            
            This PR promotes stable changes from the `testing` branch to `main`.
            
            ### Changes Included:
            - ✅ All tests passing
            - ✅ Code quality checks passed
            - ✅ Development files cleaned up
            - ✅ Version updated to ${{ github.event.inputs.version }}
            
            ### Files Promoted:
            - Source code (stable version)
            - Documentation updates
            - Configuration files
            - Release notes
            
            ### Files Removed:
            - Development artifacts
            - Temporary files
            - Debug workflows
            
            ### Checklist:
            - [ ] Review all changes
            - [ ] Verify version numbers
            - [ ] Check documentation
            - [ ] Test functionality
            - [ ] Approve for merge
            
            **Note**: This PR should only be merged after thorough review and testing.
          labels: |
            release
            promotion
            testing-to-main
          assignees: ${{ github.actor }}

  notify-completion:
    runs-on: ubuntu-latest
    needs: [create-pull-request]
    if: always()
    steps:
      - name: Notify completion
        run: |
          echo "=== Promotion Process Complete ==="
          echo "✅ Testing branch validated"
          echo "✅ Tests passed"
          echo "✅ Development files cleaned up"
          echo "✅ Release branch created"
          echo "✅ Pull request created"
          echo ""
          echo "Next steps:"
          echo "1. Review the pull request"
          echo "2. Run final tests if needed"
          echo "3. Merge to main"
          echo "4. Create git tag"
          echo "5. Publish release" 