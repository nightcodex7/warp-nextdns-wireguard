name: Release Management

on:
  push:
    branches: [main, testing]
  pull_request:
    branches: [main, testing]
  release:
    types: [published]

jobs:
  # Branch Management
  branch-protection:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Set up branch protection
        run: |
          echo "Setting up branch protection rules for main branch"
          # This would require GitHub API calls with appropriate permissions
          # For now, we'll just log the action
          echo "Main branch protection should be configured manually in repository settings"
  
  # Testing Branch Management
  testing-branch:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/testing'
    steps:
      - name: Set testing as default for GitHub Pages
        run: |
          echo "Setting testing branch as default for GitHub Pages"
          # This would require GitHub API calls
          echo "Testing branch should be set as default for GitHub Pages manually"
  
  # Build and Test
  build-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: [3.8, 3.9, 3.10, 3.11]
    
    steps:
      - uses: actions/checkout@v3
        with:
          ref: ${{ github.ref }}
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
      
      - name: Run tests
        run: |
          python -m pytest tests/ -v --cov=core --cov=utils --cov-report=xml
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: true
  
  # Build Executables
  build-executables:
    runs-on: ${{ matrix.os }}
    needs: build-test
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    
    steps:
      - uses: actions/checkout@v3
        with:
          ref: ${{ github.ref }}
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      
      - name: Build executable
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            pyinstaller --onefile --windowed --name "WARP_NextDNS_Manager" cli.py
          else
            pyinstaller --onefile --name "warp-nextdns-manager" cli.py
          fi
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: executable-${{ runner.os }}
          path: dist/
  
  # Release Management
  create-release:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build-test, build-executables]
    
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Generate changelog
        id: changelog
        run: |
          # Generate changelog from commits
          echo "## Changelog" > CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "### $(date +%Y-%m-%d)" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          git log --oneline --since="1 week ago" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "### Previous Changes" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          git log --oneline --since="1 month ago" --until="1 week ago" >> CHANGELOG.md
      
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: Release v${{ github.run_number }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
      
      - name: Download build artifacts
        uses: actions/download-artifact@v3
        with:
          path: dist/
      
      - name: Upload release assets
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./dist/
          asset_name: WARP_NextDNS_Manager_v${{ github.run_number }}
          asset_content_type: application/octet-stream
  
  # Deploy to GitHub Pages
  deploy-pages:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/testing'
    needs: build-test
    
    steps:
      - uses: actions/checkout@v3
        with:
          ref: testing
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install mkdocs mkdocs-material
      
      - name: Build documentation
        run: |
          mkdocs build --site-dir docs/
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
          force_orphan: true

  # Cleanup old branches
