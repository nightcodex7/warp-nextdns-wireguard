name: WARP + NextDNS Tests

on:
  push:
    branches: [ main, testing ]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'requirements.txt'
      - '.github/workflows/warp-nextdns-tests.yml'
  pull_request:
    branches: [ main, testing ]

jobs:
  test-warp-nextdns:
    name: Test WARP + NextDNS Integration
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-mock
    
    - name: Run WARP connection tests
      run: |
        echo "Testing WARP connection functionality..."
        python -m pytest tests/test_warp_connection.py -v
      continue-on-error: true
    
    - name: Run NextDNS configuration tests
      run: |
        echo "Testing NextDNS configuration..."
        python -m pytest tests/test_nextdns_config.py -v
      continue-on-error: true
    
    - name: Run integration tests
      run: |
        echo "Running full integration tests..."
        python -m pytest tests/ -v --cov=src --cov-report=xml
    
    - name: Validate configuration files
      run: |
        echo "Validating WARP and NextDNS configurations..."
        python scripts/validate_config.py
      continue-on-error: true
    
    - name: Security scan
      run: |
        pip install safety
        safety check --json
      continue-on-error: true