name: Branch Sync Workflow

permissions:
  contents: write
  pull-requests: write

on:
  push:
    branches: [ main, testing ]
  pull_request:
    branches: [ main, testing ]
    types: [ closed ]
  workflow_dispatch:
    inputs:
      force_sync:
        description: 'Force sync even with conflicts'
        required: false
        default: 'false'

jobs:
  sync-to-master:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Configure Git
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
    
    - name: Fetch all branches
      run: |
        git fetch origin main:main
        git fetch origin testing:testing
        git fetch origin master:master || git checkout -b master
    
    - name: Sync master branch
      run: |
        # Checkout master branch
        git checkout master
        
        # Determine which branch triggered the workflow
        TRIGGER_BRANCH="${GITHUB_REF#refs/heads/}"
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          TRIGGER_BRANCH="${{ github.base_ref }}"
        fi
        
        echo "Triggered by: $TRIGGER_BRANCH"
        
        # Merge with priority
        if [ "$TRIGGER_BRANCH" = "main" ]; then
          echo "Merging main first (priority), then testing..."
          git merge origin/main --no-edit --strategy=recursive -X theirs || {
            echo "Conflicts detected, using theirs strategy"
            git merge origin/main --no-edit --strategy=recursive -X theirs
          }
          git merge origin/testing --no-edit --strategy=recursive -X ours || {
            echo "Conflicts detected, using ours strategy"
            git merge origin/testing --no-edit --strategy=recursive -X ours
          }
        else
          echo "Merging testing first (priority), then main..."
          git merge origin/testing --no-edit --strategy=recursive -X theirs || {
            echo "Conflicts detected, using theirs strategy"
            git merge origin/testing --no-edit --strategy=recursive -X theirs
          }
          git merge origin/main --no-edit --strategy=recursive -X ours || {
            echo "Conflicts detected, using ours strategy"
            git merge origin/main --no-edit --strategy=recursive -X ours
          }
        fi
    
    - name: Clean up based on branch rules
      run: |
        # Remove summary files
        find . -name "*_SUMMARY.md" -o -name "*_summary.md" | grep -v ".git" | xargs rm -f || true
        
        # Remove temporary files
        find . -name "*.tmp" -o -name "*.temp" -o -name "*.bak" -o -name "*~" | grep -v ".git" | xargs rm -f || true
        
        # If there are changes, commit them
        if [ -n "$(git status --porcelain)" ]; then
          git add -A
          git commit -m "cleanup: remove forbidden files from master branch"
        fi
    
    - name: Push master branch
      run: |
        git push origin master --force-with-lease || git push origin master --force
    
    - name: Verify master branch integrity
      run: |
        echo "Master branch updated successfully!"
        echo "Current commit: $(git rev-parse HEAD)"
        echo "Contains files from both main and testing branches."
  
  update-other-branches:
    runs-on: ubuntu-latest
    needs: sync-to-master
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Configure Git
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
    
    - name: Update main and testing from master
      run: |
        echo "Master branch was updated directly. Syncing changes back to main and testing..."
        
        # Update main branch
        git checkout main
        git merge origin/master --no-edit --strategy=recursive -X ours
        
        # Remove files that shouldn't be on main
        rm -rf docs/ || true
        find .github/workflows -type f -name "*.yml" | grep -vE "(main-release|promote-to-main|branch-protection-check|branch-sync).yml" | xargs rm -f || true
        
        if [ -n "$(git status --porcelain)" ]; then
          git add -A
          git commit -m "sync: update from master and clean branch-specific files"
        fi
        
        git push origin main
        
        # Update testing branch
        git checkout testing
        git merge origin/master --no-edit --strategy=recursive -X theirs
        git push origin testing