name: Deploy to GitHub Pages (DEPRECATED)

on:
  push:
    branches: [ testing ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Verify static website
        run: |
          echo "=== Static Website Verification ==="
          echo "Checking docs directory structure..."
          ls -la docs/
          echo ""
          echo "HTML files found:"
          find docs/ -name "*.html" -type f
          echo ""
          echo "CSS files found:"
          find docs/ -name "*.css" -type f
          echo ""
          echo "Checking for .nojekyll file:"
          ls -la docs/.nojekyll || echo "No .nojekyll file found"
          echo ""
          echo "Testing index.html accessibility:"
          if [ -f "docs/index.html" ]; then
            echo "✅ index.html exists and is accessible"
          else
            echo "❌ index.html not found!"
            exit 1
          fi
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
