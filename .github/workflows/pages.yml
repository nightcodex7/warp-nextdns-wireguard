name: Deploy to GitHub Pages

on:
  push:
    branches: [ testing ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Verify static website
        run: |
          echo "Static website is already built in /docs folder"
          echo "No build process needed for static HTML/CSS website"
          ls -la docs/
          echo "Files in docs directory:"
          find docs/ -type f -name "*.html" -o -name "*.css" -o -name "*.md" | head -10
          echo "Checking for .nojekyll file:"
          ls -la docs/.nojekyll || echo "No .nojekyll file found"
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
