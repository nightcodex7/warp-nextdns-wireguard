name: Deploy Documentation

permissions:
  contents: write
  pages: write
  id-token: write

on:
  push:
    branches: [ testing ]
    paths:
      - 'docs/**'
      - '.github/workflows/docs-deploy.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Setup Pages
      uses: actions/configure-pages@v3
      
    - name: Build documentation
      run: |
        # Ensure docs directory exists
        if [ ! -d "docs" ]; then
          echo "❌ No docs directory found!"
          exit 1
        fi
        
        # Check for required files
        REQUIRED_FILES=("index.html" "styles.css")
        for file in "${REQUIRED_FILES[@]}"; do
          if [ ! -f "docs/$file" ]; then
            echo "❌ Missing required file: docs/$file"
            exit 1
          fi
        done
        
        # Create .nojekyll if it doesn't exist
        touch docs/.nojekyll
        
        # Optimize images if any
        find docs -name "*.png" -o -name "*.jpg" -o -name "*.jpeg" | while read img; do
          echo "Found image: $img"
        done
        
        echo "✅ Documentation ready for deployment"
      shell: bash
    
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v2
      with:
        path: ./docs
    
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v2
      
    - name: Verify deployment
      run: |
        echo "🌐 Documentation deployed to GitHub Pages"
        echo "URL: ${{ steps.deployment.outputs.page_url }}"
      shell: bash

  validate-html:
    runs-on: ubuntu-latest
    needs: build-and-deploy
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
    
    - name: Validate HTML files
      run: |
        # Basic HTML validation
        for html_file in docs/*.html; do
          if [ -f "$html_file" ]; then
            echo "Validating $html_file..."
            # Check for basic HTML structure
            if ! grep -q "<!DOCTYPE html>" "$html_file"; then
              echo "⚠️  Missing DOCTYPE in $html_file"
            fi
            if ! grep -q "<html" "$html_file"; then
              echo "⚠️  Missing <html> tag in $html_file"
            fi
            if ! grep -q "</html>" "$html_file"; then
              echo "⚠️  Missing closing </html> tag in $html_file"
            fi
          fi
        done
        
        echo "✅ HTML validation complete"
      shell: bash 