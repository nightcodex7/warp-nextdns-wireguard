name: Main Branch Release Management

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a new release'
        required: false
        default: 'false'
      release_version:
        description: 'Release version'
        required: false
        default: ''

permissions:
  contents: write
  packages: write
  actions: read

concurrency:
  group: "main-release"
  cancel-in-progress: false

jobs:
  validate-main:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
      
      - name: Validate main branch structure
        run: |
          echo "=== Main Branch Validation ==="
          echo "Checking for production-ready structure..."
          
          # Check for required production files
          required_files=(
            "README.md"
            "LICENSE"
            "CHANGELOG.md"
            "SECURITY.md"
            "CODE_OF_CONDUCT.md"
            "CONTRIBUTING.md"
            "requirements.txt"
            "setup.py"
            "VERSION"
            "main.py"
            "cli.py"
            "core.py"
          )
          
          missing_files=()
          for file in "${required_files[@]}"; do
            if [ -f "$file" ]; then
              echo "✅ $file - Found"
            else
              echo "❌ $file - Missing"
              missing_files+=("$file")
            fi
          done
          
          if [ ${#missing_files[@]} -gt 0 ]; then
            echo "Error: Missing required production files: ${missing_files[*]}"
            exit 1
          fi
          
          # Check for unwanted development files
          unwanted_files=(
            "warp-nextdns-manager.spec"
            "MODERN_UI_IMPLEMENTATION_SUMMARY.md"
            ".github/workflows/pages-debug.yml"
            ".github/workflows/test-trigger.yml"
          )
          
          found_unwanted=()
          for file in "${unwanted_files[@]}"; do
            if [ -f "$file" ]; then
              echo "❌ $file - Found (should not be in main branch)"
              found_unwanted+=("$file")
            fi
          done
          
          if [ ${#found_unwanted[@]} -gt 0 ]; then
            echo "Error: Development files found in main branch: ${found_unwanted[*]}"
            exit 1
          fi
          
          echo ""
          echo "✅ Main branch validation passed!"

  run-production-tests:
    runs-on: ubuntu-latest
    needs: validate-main
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run production tests
        run: |
          echo "=== Running Production Tests ==="
          python -m pytest tests/ -v --tb=short
      
      - name: Security scan
        run: |
          echo "=== Security Scan ==="
          pip install bandit safety
          bandit -r . -f json -o bandit-report.json || true
          safety check || true
      
      - name: Code quality check
        run: |
          echo "=== Code Quality Check ==="
          pip install flake8 black
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          black --check .

  build-release:
    runs-on: ubuntu-latest
    needs: [validate-main, run-production-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine wheel
      
      - name: Get version
        id: get_version
        run: |
          version=$(cat VERSION)
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "Current version: $version"
      
      - name: Build package
        run: |
          echo "=== Building Release Package ==="
          python -m build
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-package-${{ steps.get_version.outputs.version }}
          path: dist/
      
      - name: Create PyInstaller spec
        run: |
          echo "=== Creating PyInstaller Spec ==="
          pyinstaller --onefile --name warp-nextdns-manager main.py
      
      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: executable-${{ steps.get_version.outputs.version }}
          path: dist/warp-nextdns-manager*

  create-release:
    runs-on: ubuntu-latest
    needs: [validate-main, run-production-tests, build-release]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
      
      - name: Get version
        id: get_version
        run: |
          version=$(cat VERSION)
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "tag_name=v$version" >> $GITHUB_OUTPUT
      
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-package-${{ steps.get_version.outputs.version }}
          path: dist/
      
      - name: Download executable
        uses: actions/download-artifact@v4
        with:
          name: executable-${{ steps.get_version.outputs.version }}
          path: dist/
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.tag_name }}
          name: Release ${{ steps.get_version.outputs.version }}
          body: |
            ## 🚀 Release ${{ steps.get_version.outputs.version }}
            
            ### What's New
            - Stable production release
            - All tests passing
            - Security validated
            - Code quality verified
            
            ### Downloads
            - Source distribution
            - Wheel package
            - Standalone executable
            
            ### Installation
            ```bash
            pip install warp-nextdns-manager==${{ steps.get_version.outputs.version }}
            ```
            
            ### Documentation
            - [Installation Guide](https://nightcodex7.github.io/warp-nextdns-wireguard/installation.html)
            - [GitHub Repository](https://github.com/nightcodex7/warp-nextdns-wireguard)
            
            ### Changelog
            See [CHANGELOG.md](https://github.com/nightcodex7/warp-nextdns-wireguard/blob/main/CHANGELOG.md) for detailed changes.
          draft: false
          prerelease: false
          files: |
            dist/warp-nextdns-manager-${{ steps.get_version.outputs.version }}.tar.gz
            dist/warp_nextdns_manager-${{ steps.get_version.outputs.version }}-py3-none-any.whl
            dist/warp-nextdns-manager

  publish-to-pypi:
    runs-on: ubuntu-latest
    needs: [validate-main, run-production-tests, build-release]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-package-${{ steps.get_version.outputs.version }}
          path: dist/
      
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: dist/

  notify-release:
    runs-on: ubuntu-latest
    needs: [create-release, publish-to-pypi]
    if: always()
    steps:
      - name: Notify release completion
        run: |
          echo "=== Release Process Complete ==="
          echo "✅ Main branch validated"
          echo "✅ Production tests passed"
          echo "✅ Release package built"
          echo "✅ GitHub release created"
          echo "✅ PyPI package published"
          echo ""
          echo "Release is now available:"
          echo "- GitHub: https://github.com/nightcodex7/warp-nextdns-wireguard/releases"
          echo "- PyPI: https://pypi.org/project/warp-nextdns-manager/"
          echo "- Documentation: https://nightcodex7.github.io/warp-nextdns-wireguard/" 