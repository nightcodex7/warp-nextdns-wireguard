# Pre-commit configuration for documentation deployment
# This ensures only documentation changes are allowed on the testing branch

repos:
  - repo: local
    hooks:
      - id: docs-only-check
        name: Documentation Only Check
        entry: bash -c 'echo "Checking if only documentation files are modified..." && git diff --cached --name-only | grep -v "^docs/" | grep -v "^.github/workflows/docs-deploy.yml" | grep -v "^.github/branch-protection.yml" | grep -v "^README.md" && echo "Error: Non-documentation files detected. Only docs/ folder changes are allowed on testing branch." && exit 1 || echo "✅ Only documentation files modified"'
        language: system
        stages: [commit]
        if: branch == "testing"

      - id: docs-structure-check
        name: Documentation Structure Check
        entry: bash -c 'echo "Validating documentation structure..." && [ -f "docs/index.html" ] && [ -f "docs/installation.html" ] && [ -f "docs/styles.css" ] && [ -f "docs/.nojekyll" ] && echo "✅ Required documentation files present" || (echo "❌ Missing required documentation files" && exit 1)'
        language: system
        stages: [commit]
        if: branch == "testing"

      - id: html-validation
        name: HTML Validation
        entry: bash -c 'echo "Validating HTML files..." && for file in docs/*.html; do if [ -f "$file" ]; then if ! grep -q "<!DOCTYPE html>" "$file" || ! grep -q "</html>" "$file"; then echo "❌ Invalid HTML structure in $file"; exit 1; fi; fi; done && echo "✅ HTML files validated"'
        language: system
        stages: [commit]
        if: branch == "testing"

      - id: link-check
        name: Internal Link Check
        entry: bash -c 'echo "Checking internal links..." && for file in docs/*.html; do if [ -f "$file" ]; then if grep -q "href=\"[^#]*\"" "$file"; then echo "✅ Internal links found in $file"; fi; fi; done'
        language: system
        stages: [commit]
        if: branch == "testing"

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: trailing-whitespace
        files: ^docs/
      - id: end-of-file-fixer
        files: ^docs/
      - id: check-yaml
        files: ^docs/
      - id: check-added-large-files
        args: ['--maxkb=1000']
        files: ^docs/

  - repo: https://github.com/psf/black
    rev: 23.3.0
    hooks:
      - id: black
        language_version: python3
        files: ^docs/

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.0.0
    hooks:
      - id: prettier
        files: ^docs/
        types: [html, css, javascript] 