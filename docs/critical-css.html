<!-- Critical CSS for above-the-fold content -->
<style>
/* Reset and base styles */
*,*::before,*::after{box-sizing:border-box}
body{margin:0;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e0e0e0;line-height:1.6}

/* Navigation critical styles */
.navbar{position:fixed;top:0;width:100%;background:rgba(26,26,26,0.95);backdrop-filter:blur(10px);z-index:1000;padding:1rem 0;transition:all 0.3s}
.navbar-brand{color:#ff6600!important;font-weight:700;font-size:1.5rem;text-decoration:none;display:flex;align-items:center;gap:0.5rem}
.navbar-brand i{font-size:1.8rem}
.container{max-width:1200px;margin:0 auto;padding:0 1rem}

/* Hero section critical styles */
.hero{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a1a1a 0%,#0a0a0a 100%);position:relative;overflow:hidden}
.hero-content{text-align:center;z-index:1;padding:2rem}
.hero h1{font-size:clamp(2.5rem,5vw,4rem);font-weight:800;margin-bottom:1.5rem;background:linear-gradient(135deg,#ff6600 0%,#ff4400 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero .lead{font-size:1.25rem;color:#b0b0b0;margin-bottom:2rem;max-width:600px;margin-left:auto;margin-right:auto}

/* Button critical styles */
.btn{display:inline-block;padding:0.75rem 2rem;border-radius:50px;text-decoration:none;font-weight:600;transition:all 0.3s;cursor:pointer;border:none}
.btn-primary{background:linear-gradient(135deg,#ff6600 0%,#ff4400 100%);color:white}
.btn-secondary{background:transparent;color:#ff6600;border:2px solid #ff6600}

/* Loading state */
.loading{position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0a0a;display:flex;align-items:center;justify-content:center;z-index:9999}
</style>
