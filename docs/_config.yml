# Jekyll configuration for GitHub Pages
title: WARP + NextDNS Manager
description: Enterprise-Grade Cloudflare WARP + NextDNS Integration
author: nightcodex7
url: https://nightcodex7.github.io/warp-nextdns-wireguard

# Build settings
theme: jekyll-theme-minimal
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# Exclude from processing
exclude:
  - README.md
  - LICENSE
  - requirements.txt
  - setup.py
  - *.py
  - tests/
  - utils/
  - .github/

# Collections
collections:
  docs:
    output: true
    permalink: /:collection/:name/

# Defaults
defaults:
  - scope:
      path: ""
      type: "docs"
    values:
      layout: "default"

# Markdown settings
markdown: kramdown
highlighter: rouge

# Pagination
paginate: 10
paginate_path: "/page/:num/"

# Sitemap
sitemap:
  exclude: ['/atom.xml', '/feed.xml']
  change_freq: weekly
  priority: 0.8 